services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pregnancy
    ports:
      # 宿主机 5433，避免与本机已在跑的 5432 冲突；容器内 api 仍用 db:5432
      - "5433:5432"
    volumes:
      - pregnancy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pregnancy"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://postgres:postgres@db:5432/pregnancy?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-change-me-long-random-in-production}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:8080}
    volumes:
      - api_uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pregnancy_pgdata:
  api_uploads:
